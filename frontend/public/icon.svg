<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141419" />
      <stop offset="100%" stop-color="#0A0A0F" />
    </linearGradient>
    <linearGradient id="zap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B93DB" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow Circle Background -->
  <circle cx="512" cy="512" r="512" fill="url(#bg)" />
  <circle cx="512" cy="512" r="480" fill="none" stroke="rgba(123, 147, 219, 0.15)" stroke-width="16" />
  
  <!-- Centered Zap Icon -->
  <g transform="translate(180, 180) scale(27.6)" filter="url(#glow)">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="url(#zap)" stroke="rgba(255,255,255,0.8)" stroke-width="0.3" stroke-linejoin="round" />
  </g>
</svg>
